name: Build and Deploy Spring Boot to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Show generated JAR
        run: ls -la target

      # Pick only the executable Spring Boot jar
      - name: Find Spring Boot JAR
        id: jar
        run: |
          JAR_FILE=$(ls target/*.jar | grep -v ".jar.original" | head -n 1)
          echo "jar_path=$JAR_FILE" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: protein-calculator-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ steps.jar.outputs.jar_path }}
