spring.application.name=protein-calculator

# Azure App Service (Linux) injects a port in the PORT env var for many runtimes.
# Default stays 8080 for local/dev.
server.port=${PORT:8080}

# Profile selection (override in Azure App Service -> Configuration -> App settings)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Logging (cloud-friendly defaults)
logging.level.root=INFO
logging.level.com.example.protein_calculator=INFO
logging.level.org.springframework.web=INFO

# Student testing CORS defaults (can be overridden by env vars)
app.cors.allowed-origin-patterns=*
app.cors.allow-credentials=false
app.cors.max-age-seconds=3600
