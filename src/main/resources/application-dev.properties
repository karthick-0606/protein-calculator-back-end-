# Dev defaults (local)

# CORS (testing)
# Allow all origins only for testing. Do NOT enable credentials with '*'.
app.cors.allowed-origin-patterns=*
app.cors.allow-credentials=false
app.cors.max-age-seconds=3600

# H2 in-memory database (NOT persistent)
spring.datasource.url=jdbc:h2:mem:proteinDb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
