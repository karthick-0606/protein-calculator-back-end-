# Production defaults (Azure)
# Configure a real database via environment variables / App Service app settings.

# CORS (production)
# Restrict allowed origins via Azure App Service -> Configuration -> App settings.
# Examples:
#   APP_CORS_ALLOWED_ORIGIN_PATTERNS=https://your-frontend.azurewebsites.net
#   APP_CORS_ALLOW_CREDENTIALS=true
#
# NOTE: Leaving CORS origins unset means the API will NOT send Access-Control-Allow-Origin
# and browsers will block cross-origin calls (secure-by-default).

# Example for Postgres:
# spring.datasource.url=jdbc:postgresql://<host>:5432/<db>
# spring.datasource.username=<user>
# spring.datasource.password=<pass>

# Prefer Spring's standard env var mapping in App Service:
#   SPRING_DATASOURCE_URL
#   SPRING_DATASOURCE_USERNAME
#   SPRING_DATASOURCE_PASSWORD
# If you use custom names, wire them like this:
# spring.datasource.url=${DATABASE_URL}
# spring.datasource.username=${DATABASE_USERNAME}
# spring.datasource.password=${DATABASE_PASSWORD}

# Fail fast if no datasource is provided in prod.
# (Leaving these empty makes misconfig obvious at startup.)

# JPA / Hibernate (choose based on your migration strategy)
# - validate: safest when you use migrations (Flyway/Liquibase)
# - update: not recommended for production schemas
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Logging
logging.level.root=INFO
logging.level.com.example.protein_calculator=INFO

# H2 console must be off in prod
spring.h2.console.enabled=false

# Reduce noisy stack traces in HTTP responses
server.error.include-message=never
server.error.include-stacktrace=never
